name: Release

# Cut a release by pushing a tag, e.g.:  git tag v1.0.0 && git push origin v1.0.0
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12        base64 of your "Developer ID Application" cert .p12
#   MACOS_CERT_PASSWORD   password for that .p12
#   KEYCHAIN_PASSWORD     any throwaway password for the temporary CI keychain
#   MACOS_SIGN_IDENTITY   e.g. "Developer ID Application: David Hersey (TEAMID)"
#   APPLE_ID              Apple ID email used for notarization
#   APPLE_APP_PASSWORD    app-specific password for that Apple ID
#   APPLE_TEAM_ID         your Apple Developer Team ID
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Build app bundle (unsigned)
        run: SIGN_IDENTITY="" ./macos/build_app.sh --here

      - name: Code-sign (Developer ID, hardened runtime)
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" macos/G8Volume.app
          codesign --verify --strict --verbose=2 macos/G8Volume.app

      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent macos/G8Volume.app G8Volume.zip
          xcrun notarytool submit G8Volume.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple macos/G8Volume.app

      - name: Package stapled app
        run: ditto -c -k --keepParent macos/G8Volume.app G8Volume.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" G8Volume.zip --title "$TAG" --generate-notes

  # Re-download the published app and confirm a fresh install would be clean:
  # signed, notarized, stapled, and accepted by Gatekeeper. Fails if anything is off.
  validate:
    needs: release
    runs-on: macos-15
    steps:
      - name: Validate the published release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release download "$TAG" --repo "$REPO" --pattern "G8Volume.zip"
          ditto -x -k G8Volume.zip out
          codesign --verify --strict --verbose=2 out/G8Volume.app
          xcrun stapler validate out/G8Volume.app
          spctl -a -t exec -vvv out/G8Volume.app
